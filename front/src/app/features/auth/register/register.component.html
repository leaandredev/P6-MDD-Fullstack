<div class="register">
    <div class="flex-container flex-column">
        <img *ngIf="handsetPortrait" src="/assets/logo_p6.png" alt="logo" />
        <h1>Inscription</h1>
        <form class="register-form" [formGroup]="form" (ngSubmit)="submit()">
            <div class="flex-container flex-column">
                <mat-form-field appearance="outline">
                    <mat-label>Nom d'utilisateur</mat-label>
                    <input matInput formControlName="userName">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Adresse e-mail</mat-label>
                    <input matInput formControlName="email">
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>Mot de passe</mat-label>
                    <input matInput formControlName="password">
                    <div *ngIf="password?.invalid && password?.touched">
                        <mat-error *ngIf="password?.errors?.['required']">Le mot de passe est requis.</mat-error>
                        <mat-error *ngIf="password?.errors?.['minlength']">Minimum 8 caractères.</mat-error>
                        <mat-error *ngIf="password?.errors?.['pattern']">
                            Doit contenir une majuscule, une minuscule, un chiffre et un caractère spécial.
                        </mat-error>
                    </div>
                </mat-form-field>
                <span *ngIf="onError" class="error">An error occurred</span>
                <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">S'inscrire</button>
            </div>
        </form>
    </div>
</div>
