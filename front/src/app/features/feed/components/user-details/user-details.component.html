<div class="user-details">
    <div class="flex-container flex-column">
        <h1>Profil utilisateur</h1>
        <form class="user-details-form" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="flex-container flex-column">
                <mat-form-field appearance="outline">
                    <mat-label>Nom d'utilisateur</mat-label>
                    <input matInput formControlName="userName" />
                </mat-form-field>
                <mat-form-field appearance="outline">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email" />
                </mat-form-field>
                <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Sauvegarder</button>
                <a mat-button color="warn" (click)="logOut()">Se déconnecter</a>
            </div>
        </form>
    </div>
</div>
